<h1 mat-dialog-title [innerHTML]="title()"></h1>
<mat-dialog-content>
    <p class="text-dark mat-body-2" [innerHTML]="confirmationMessage()"></p>
</mat-dialog-content>
<mat-dialog-actions align="end" class="gap-2" [class]="footerButtonPosition()">
    @if (showCancelButton()) {
    <button
        cdkFocusRegionStart
        type="reset"
        [class]="cancelButtonClass()"
        mat-dialog-close
        matButton
        [color]="cancelButtonColor()"
        (click)="closeDialog('no')"
    >
        {{ cancelButtonText() }}
    </button>
    } @if (showConfirmButton()) {
    <button
        type="button"
        matButton="filled"
        mat-dialog-close
        cdkFocusRegionEnd
        cdkFocusInitial
        [class]="confirmButtonClass()"
        [color]="confirmButtonColor()"
        (click)="closeDialog('yes')"
    >
        {{ confirmButtonText() }}
    </button>
    }
</mat-dialog-actions>
