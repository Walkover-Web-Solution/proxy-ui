<h1 mat-dialog-title class="mat-subheading-2 text-dark mb-6 font-medium" [innerHTML]="title()"></h1>
<div mat-dialog-content class="w-full mb-6">
    <p class="text-dark mat-body-2 my-0" [innerHTML]="confirmationMessage()"></p>
</div>
<div cdkTrapFocus mat-dialog-actions class="flex gap-2 items-center" [class]="footerButtonPosition()">
    @if (showCancelButton()) {
    <button
        cdkFocusRegionStart
        type="reset"
        [class]="cancelButtonClass()"
        mat-dialog-close
        matButton
        [color]="cancelButtonColor()"
        (click)="closeDialog('no')"
    >
        {{ cancelButtonText() }}
    </button>
    } @if (showConfirmButton()) {
    <button
        type="button"
        matButton="filled"
        mat-dialog-close
        cdkFocusRegionEnd
        cdkFocusInitial
        [class]="confirmButtonClass()"
        [color]="confirmButtonColor()"
        (click)="closeDialog('yes')"
    >
        {{ confirmButtonText() }}
    </button>
    }
</div>
