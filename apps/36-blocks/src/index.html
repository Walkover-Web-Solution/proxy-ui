<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>36Blocks — Secure Auth &amp; User Management for Modern Apps</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#3f51b5" />
        <meta name="robots" content="index, follow" />
        <meta name="author" content="36Blocks" />
        <link rel="canonical" href="https://36blocks.com/" />
        <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet"
        />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet" />

        <!-- Blocking render until auth state and theme are resolved to prevent any visual flash -->
        <style>
            html.auth-loading body {
                visibility: hidden;
            }
        </style>
        <script>
            (function () {
                // Block paint immediately — removed once auth decision + theme are applied
                document.documentElement.classList.add('auth-loading');

                // ── AUTH ───────────────────────────────────────────────────────────────
                // Theme is intentionally NOT applied here.
                // body is invisible (auth-loading) until Angular bootstraps, so
                // UiSettingsService applies the theme class to <body> at startup — no flash.
                // ONLY the cookie is synchronous and reliable at this point.
                // Firebase / NgRx are async and must not be used here.
                var isAuthenticated = false;
                try {
                    isAuthenticated = document.cookie.indexOf('authToken=') !== -1;
                } catch (cookieError) {}

                var currentPath = window.location.pathname;

                // Authenticated user on landing page → send to app
                if (currentPath === '/' && isAuthenticated) {
                    window.location.replace('/app/dashboard');
                    return; // page is navigating away; do not unblock paint
                }

                // Unauthenticated user on any protected /app route → send to landing
                if (currentPath.startsWith('/app') && !isAuthenticated) {
                    window.location.replace('/');
                    return; // page is navigating away; do not unblock paint
                }

                // Correct page — unblock paint
                document.documentElement.classList.remove('auth-loading');
            })();
        </script>
    </head>
    <body>
        <proxy-root></proxy-root>
    </body>
</html>
