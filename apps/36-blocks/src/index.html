<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>36Blocks — Secure Auth &amp; User Management for Modern Apps</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#3f51b5" />
        <meta name="robots" content="index, follow" />
        <meta name="author" content="36Blocks" />
        <link rel="canonical" href="https://36blocks.com/" />
        <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
        <link
            rel="preload"
            href="/assets/images/36-blocks-logo.svg"
            as="image"
            type="image/svg+xml"
            fetchpriority="high"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media = 'all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
                rel="stylesheet"
            />
        </noscript>
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons%7CMaterial+Icons+Outlined&display=swap"
            rel="stylesheet"
            media="print"
            onload="this.media = 'all'"
        />
        <noscript>
            <link
                href="https://fonts.googleapis.com/icon?family=Material+Icons%7CMaterial+Icons+Outlined&display=swap"
                rel="stylesheet"
            />
        </noscript>
    </head>
    <body>
        <div id="app-splash-screen">
            <style>
                #app-splash-screen {
                    position: fixed;
                    inset: 0;
                    z-index: 99999;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: var(--color-common-bg) !important;
                    transition: opacity 0.25s ease;
                }
                #app-splash-screen.splash-hidden {
                    opacity: 0;
                    pointer-events: none;
                }
                .splash-logo {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 20px;
                }
                .splash-spinner {
                    width: 42px;
                    height: 42px;
                    border: 3px solid rgba(255, 255, 255, 0.12);
                    border-top-color: var(--mat-sys-primary);
                    border-radius: 50%;
                    animation: splash-spin 0.7s linear infinite;
                }
                @keyframes splash-spin {
                    to {
                        transform: rotate(360deg);
                    }
                }
            </style>
            <div class="splash-logo">
                <div class="splash-spinner"></div>
            </div>
        </div>
        <proxy-root></proxy-root>
    </body>
</html>
