<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>36Blocks — Secure Auth &amp; User Management for Modern Apps</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#3f51b5" />
        <meta name="robots" content="index, follow" />
        <meta name="author" content="36Blocks" />
        <link rel="canonical" href="https://36blocks.com/" />
        <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
            rel="stylesheet"
        />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet" />
    </head>
    <body>
        <script>
            (function () {
                // Theme initialization
                var theme = 'light-theme';
                try {
                    var stored = localStorage.getItem('ui-settings');
                    if (stored) {
                        var settings = JSON.parse(stored);
                        var ttl = 30 * 24 * 60 * 60 * 1000;
                        if (settings._savedAt && Date.now() - settings._savedAt < ttl && settings.theme) {
                            theme = settings.theme;
                        }
                    }
                } catch (e) {}
                document.body.classList.add(theme);

                // Auth redirect check - only on root path
                if (window.location.pathname === '/') {
                    try {
                        // Check for authToken cookie
                        var hasAuthCookie = document.cookie.split(';').some(function (item) {
                            return item.trim().indexOf('authToken=') === 0;
                        });

                        // Check for Firebase auth in localStorage
                        var hasFirebaseAuth = false;
                        for (var i = 0; i < localStorage.length; i++) {
                            var key = localStorage.key(i);
                            if (key && key.indexOf('firebase:authUser:') === 0) {
                                var authData = localStorage.getItem(key);
                                if (authData && authData !== 'null') {
                                    hasFirebaseAuth = true;
                                    break;
                                }
                            }
                        }

                        // Redirect if authenticated
                        if (hasAuthCookie || hasFirebaseAuth) {
                            window.location.replace('/app/dashboard');
                        }
                    } catch (e) {
                        console.error('Failed to check authentication state:', e);
                    }
                }
            })();
        </script>
        <proxy-root></proxy-root>
    </body>
</html>
