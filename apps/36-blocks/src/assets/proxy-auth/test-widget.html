<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Proxy Auth Widget - Single File Test</title>
        <style>
            body {
                margin: 0;
                padding: 20px;
                font-family: system-ui, -apple-system, sans-serif;
                background: #f5f5f5;
            }
            .test-container {
                max-width: 600px;
                margin: 0 auto;
                background: white;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            h1 {
                color: #333;
                margin-top: 0;
            }
            .info {
                background: #e3f2fd;
                padding: 12px;
                border-radius: 4px;
                margin-bottom: 20px;
                font-size: 14px;
            }
            #YOUR_REFERENCE_ID {
                min-height: 200px;
                border: 2px dashed #ccc;
                border-radius: 4px;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div class="test-container">
            <h1>🚀 Proxy Auth Widget Test</h1>
            <div class="info">
                <strong>Test Status:</strong> Single-file bundle (proxy-auth.js)<br />
                <strong>Bundle Size:</strong> ~1.3 MB (includes CSS + all assets)<br />
                <strong>Configuration:</strong> Replace YOUR_REFERENCE_ID with your actual reference ID
            </div>

            <!-- Widget container -->
            <div id="YOUR_REFERENCE_ID"></div>
        </div>

        <!-- Configuration -->
        <script type="text/javascript">
            var configuration = {
                referenceId: 'YOUR_REFERENCE_ID', // REQUIRED: Replace with actual ID
                theme: 'system', // 'system' | 'light' | 'dark'
                target: '_self', // '_self' | '_blank'
                // loginRedirectUrl: 'https://example.com/dashboard',
                success: function (data) {
                    console.log('✅ Login success', data);
                    alert('Login successful! Check console for details.');
                },
                failure: function (error) {
                    console.error('❌ Login failed', error);
                    alert('Login failed. Check console for details.');
                },
            };
        </script>

        <!-- Load the widget - Single JS file includes everything -->
        <script type="text/javascript">
            var scriptElement = document.createElement('script');
            scriptElement.src = './proxy-auth.js'; // Single file - no external dependencies
            scriptElement.onload = function () {
                console.log('✅ Widget script loaded');
                console.log('📦 Bundle includes: JS + CSS + Fonts (inlined)');
                console.log('🎯 Initializing widget...');
                initVerification(configuration);
            };
            scriptElement.onerror = function () {
                console.error('❌ Failed to load widget script');
            };
            document.body.appendChild(scriptElement);
        </script>
    </body>
</html>
