<div
    class="min-h-screen bg-[#0d1117] flex flex-col items-center justify-center px-4"
    role="main"
    aria-label="Account verification in progress"
>
    @if (onboardingError()) {
        <!-- Error state -->
        <div class="w-full max-w-sm text-center" role="alert" aria-live="assertive">
            <div
                class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-red-500/10 border border-red-500/20 mb-5"
                aria-hidden="true"
            >
                <svg
                    class="w-7 h-7 text-red-400"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
                    />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white mb-2">Verification failed</h1>
            <p class="text-sm text-[#8b949e] leading-relaxed mb-6">{{ onboardingError() }}</p>
            <p class="text-xs text-[#6e7681]">
                Redirecting to homepage in
                <span class="font-semibold text-teal-400">{{ redirectCountdown() }}</span>
                second{{ redirectCountdown() !== 1 ? 's' : '' }}…
            </p>
        </div>
    } @else {
        <!-- Loading / verifying state -->
        <div class="w-full max-w-sm text-center" aria-live="polite" aria-busy="true">
            <div
                class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-teal-400/10 border border-teal-400/20 mb-5"
                aria-hidden="true"
            >
                <svg class="w-7 h-7 text-teal-400 animate-spin" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8V0C5.373 0 0 5.373 0 12h4z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-white mb-2">Verifying your account</h1>
            <p class="text-sm text-[#8b949e]">Please wait while we complete your sign-up…</p>
        </div>
    }
</div>
