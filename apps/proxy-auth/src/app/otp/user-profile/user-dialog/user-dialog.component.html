<div [class]="'confirm-dialog-wrap ' + (theme === 'dark' ? 'dark' : 'light')">
    <h2 mat-dialog-title>Confirm Action</h2>
    <div mat-dialog-content>
        <p>Are you sure you want to leave this company?</p>
    </div>
    <div mat-dialog-actions align="end">
        <button mat-stroked-button class="btn-dlg-cancel" (click)="closeDialog('cancel')">Cancel</button>
        <button mat-flat-button class="btn-dlg-leave" (click)="confirmleave()">Leave</button>
    </div>
</div>
