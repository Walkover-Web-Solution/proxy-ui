<div
    [style.width]="layout.widthV2"
    [style.padding]="'0'"
    [style.margin]="'0 ' + layout.gutterH + ' 16px ' + layout.gutterH"
    [style.display]="'flex'"
    [style.flex-direction]="'column'"
    [style.gap]="layout.formGap"
    [style.box-sizing]="'border-box'"
    [style.font-family]="layout.fontFamily"
    [style.border-radius]="borderRadius"
>
    <!-- Username field -->
    <div [style.display]="'flex'" [style.flex-direction]="'column'" [style.gap]="'6px'">
        <input
            type="text"
            placeholder="Email or Mobile"
            autocomplete="off"
            [(ngModel)]="username"
            [style]="inputStyle"
            (keydown)="onKeydown($event)"
        />
        <p
            [style.font-size]="'12px'"
            [style.line-height]="'18px'"
            [style.color]="isDark() ? '#e5e7eb' : '#5d6164'"
            [style.margin]="'0'"
        >
            Note: Please enter your Mobile number with the country code (e.g. 91)
        </p>
    </div>

    <!-- Password field -->
    <div [style.display]="'flex'" [style.flex-direction]="'column'" [style.gap]="'6px'" [style.position]="'relative'">
        <div [style.position]="'relative'" [style.display]="'flex'" [style.align-items]="'center'">
            <input
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Password"
                autocomplete="off"
                [(ngModel)]="password"
                [style]="passwordInputStyle"
                (keydown)="onKeydown($event)"
            />
            <button
                type="button"
                (click)="showPassword = !showPassword"
                [style.position]="'absolute'"
                [style.right]="'10px'"
                [style.background]="'transparent'"
                [style.border]="'none'"
                [style.cursor]="'pointer'"
                [style.padding]="'0'"
                [style.display]="'flex'"
                [style.align-items]="'center'"
                [style.color]="isDark() ? '#9ca3af' : '#6b7280'"
            >
                @if (!showPassword) {
                    <svg
                        width="20"
                        height="20"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        fill="currentColor"
                    >
                        <path
                            d="M12.01 20c-5.065 0-9.586-4.211-12.01-8.424 2.418-4.103 6.943-7.576 12.01-7.576 5.135 0 9.635 3.453 11.999 7.564-2.241 4.43-6.726 8.436-11.999 8.436zm-10.842-8.416c.843 1.331 5.018 7.416 10.842 7.416 6.305 0 10.112-6.103 10.851-7.405-.772-1.198-4.606-6.595-10.851-6.595-6.116 0-10.025 5.355-10.842 6.584zm10.832-4.584c2.76 0 5 2.24 5 5s-2.24 5-5 5-5-2.24-5-5 2.24-5 5-5zm0 1c2.208 0 4 1.792 4 4s-1.792 4-4 4-4-1.792-4-4 1.792-4 4-4z"
                        />
                    </svg>
                } @else {
                    <svg
                        width="20"
                        height="20"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill-rule="evenodd"
                        clip-rule="evenodd"
                        fill="currentColor"
                    >
                        <path
                            d="M8.137 15.147c-.71-.857-1.146-1.947-1.146-3.147 0-2.76 2.241-5 5-5 1.201 0 2.291.435 3.148 1.145l1.897-1.897c-1.441-.738-3.122-1.248-5.035-1.248-6.115 0-10.025 5.355-10.842 6.584.529.834 2.379 3.527 5.113 5.428l1.865-1.865zm6.294-6.294c-.673-.53-1.515-.853-2.44-.853-2.207 0-4 1.792-4 4 0 .923.324 1.765.854 2.439l5.586-5.586zm7.56-6.146l-19.292 19.293-.708-.707 3.548-3.548c-2.298-1.612-4.234-3.885-5.548-6.169 2.418-4.103 6.943-7.576 12.01-7.576 2.065 0 4.021.566 5.782 1.501l3.501-3.501.707.707zm-2.465 3.879l-.734.734c2.236 1.619 3.628 3.604 4.061 4.274-.739 1.303-4.546 7.406-10.852 7.406-1.425 0-2.749-.368-3.951-.938l-.748.748c1.475.742 3.057 1.19 4.699 1.19 5.274 0 9.758-4.006 11.999-8.436-1.087-1.891-2.63-3.637-4.474-4.978zm-3.535 5.414c0-.554-.113-1.082-.317-1.562l.734-.734c.361.69.583 1.464.583 2.296 0 2.759-2.24 5-5 5-.832 0-1.604-.223-2.295-.583l.734-.735c.48.204 1.007.318 1.561.318 2.208 0 4-1.792 4-4z"
                        />
                    </svg>
                }
            </button>
        </div>
    </div>

    <!-- Forgot password -->
    <div
        [style.width]="'100%'"
        [style.display]="'flex'"
        [style.justify-content]="'flex-end'"
        [style.margin-top]="'4px'"
    >
        <a
            href="javascript:void(0)"
            (click)="onForgotPassword()"
            [style.font-size]="'13px'"
            [style.color]="'#1976d2'"
            [style.text-decoration]="'none'"
            >Forgot Password?</a
        >
    </div>

    <!-- hCaptcha -->
    <div
        [style.width]="'100%'"
        [style.display]="'flex'"
        [style.justify-content]="'center'"
        [style.padding]="'8px 0'"
        [style.box-sizing]="'border-box'"
    >
        <div id="inline-login-hcaptcha" [style.display]="'inline-block'"></div>
    </div>

    <!-- Error message -->
    @if (errorMessage()) {
        <div [style.color]="'#d14343'" [style.font-size]="'14px'" [style.margin-bottom]="'4px'">
            {{ errorMessage() }}
        </div>
    }

    <!-- Sign in button -->
    <button
        type="button"
        [disabled]="isLoading()"
        (click)="onSubmit()"
        (mouseenter)="isHovered = true"
        (mouseleave)="isHovered = false"
        [style.height]="'36px'"
        [style.padding]="'0 12px'"
        [style.background-color]="isHovered ? buttonHoverColor : buttonColor"
        [style.color]="buttonTextColor"
        [style.border]="'none'"
        [style.border-radius]="borderRadius"
        [style.font-size]="'14px'"
        [style.font-weight]="'600'"
        [style.cursor]="isLoading() ? 'not-allowed' : 'pointer'"
        [style.width]="'100%'"
        [style.box-shadow]="'0 1px 2px rgba(0,0,0,0.08)'"
        [style.margin-top]="'4px'"
        [style.opacity]="isLoading() ? '0.7' : '1'"
    >
        {{ isLoading() ? 'Please wait...' : 'Sign in' }}
    </button>
</div>
